<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - مصمم كروت الأسعار</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:360px;padding:40px 36px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:40px;margin-bottom:10px}
.logo h1{font-size:20px;font-weight:800;color:#111}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:7px}
.form-group input{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:13px 16px;color:#111;font-family:'Cairo',sans-serif;font-size:15px;outline:none;transition:.2s;text-align:center;background:#fafafa}
.form-group input:focus{border-color:#111;background:#fff}
.form-group input::placeholder{color:#bbb}
.btn-login{width:100%;background:#111;color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px}
.btn-login:hover{background:#333}
.btn-login:disabled{opacity:.4;cursor:not-allowed}
.error-msg{background:#fff0f0;border:1px solid #fcc;border-radius:8px;padding:11px;font-size:13px;color:#c00;text-align:center;margin-top:14px;display:none}
.error-msg.show{display:block}
.loading{display:none;width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <div class="logo-icon">🎴</div>
    <h1>مصمم كروت الأسعار</h1>
  </div>
  
  <form id="loginForm">
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
    </div>
    
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" required>
      <div class="password-hint">كلمة المرور مكونة من 6 أرقام فقط</div>
    </div>
    
    <button type="submit" class="btn-login" id="loginBtn">
      <span>تسجيل الدخول</span>
      <div class="loading"></div>
    </button>
    
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>

<script>
const form = document.getElementById('loginForm');
const username = document.getElementById('username');
const password = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');
const loading = loginBtn.querySelector('.loading');

// Allow only numbers in password
password.addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, '');
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const user = username.value.trim().toLowerCase();
  const pass = password.value.trim();
  
  if (!user || !pass) {
    showError('الرجاء إدخال اسم المستخدم وكلمة المرور');
    return;
  }
  
  if (pass.length !== 6 || !/^\d{6}$/.test(pass)) {
    showError('كلمة المرور يجب أن تكون 6 أرقام');
    return;
  }
  
  setLoading(true);
  errorMsg.classList.remove('show');
  
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    
    const data = await res.json();
    
    if (data.success) {
      window.location.href = data.redirect || '/';
    } else {
      showError(data.error || 'حدث خطأ في تسجيل الدخول');
    }
  } catch (err) {
    showError('تعذر الاتصال بالخادم');
  } finally {
    setLoading(false);
  }
});

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}

function setLoading(isLoading) {
  loginBtn.disabled = isLoading;
  loginBtn.querySelector('span').style.display = isLoading ? 'none' : 'inline';
  loading.style.display = isLoading ? 'inline-block' : 'none';
}
</script>

</body>
</html>
